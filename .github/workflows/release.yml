name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Test
        run: go test ./...

      - name: Build release artifacts
        run: VERSION="${GITHUB_REF_NAME}" ./scripts/package-release.sh

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/*.tar.gz dist/checksums.txt --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/*.tar.gz dist/checksums.txt --title "NexusProxy ${GITHUB_REF_NAME}" --notes "NexusProxy ${GITHUB_REF_NAME}"
          fi
